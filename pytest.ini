[pytest]
# Pick up the project's existing `*_tests.py` naming alongside pytest's
# default `test_*.py`, so `pytest tests/` discovers both code_only_tests.py
# and network_tests.py automatically.
python_files = test_*.py *_tests.py
testpaths = tests

# Safety net: hard per-test timeout. Added after a tick-loop test
# with a fast-mocked main() became a CPU-tight infinite loop that
# starved the asyncio scheduler, never yielded to its own internal
# timeout, and OOM-thrashed the host. The `signal` method actually
# kills a wedged process — the default `thread` method can't break a
# stuck event loop. Network tests that legitimately need longer (loop
# daemon setup, regtest mining, etc.) override with @pytest.mark.timeout(N).
#
# Bumped from 60s to 180s to give rig-setup fixtures headroom under
# pytest-xdist's `-n auto` parallel CPU pressure: a regtest LND/
# Electrum setup that normally takes ~30-40s can take 2-3x longer
# when 8 workers are spinning regtest binaries simultaneously, and
# a 60s ceiling was failing fixtures (not actual tests) on slow
# hardware.
timeout = 180
timeout_method = signal

# Parallelism (pytest-xdist):
#   pytest tests/ -n auto --dist loadgroup
# Required combo:
#   -n auto         → fork one worker per CPU core
#   --dist loadgroup → keep tests with the same xdist_group on the same
#                      worker. The Electrum daemon's RPC port is
#                      hardcoded to 5000 (engine's electrum_rpc bridge
#                      assumes that endpoint), so two workers both
#                      spinning Electrum collide. Every Electrum-using
#                      test is tagged with xdist_group("electrum_workers")
#                      → they all serialize onto one worker, while every
#                      LND-only / mock-only test parallelizes freely.
# Each test gets its own data dir (tests/conftest.py creates
# `tests/_data/<test-name>-<short-uuid>/`) and dynamic ports within a
# per-worker partition (see _free_port + _worker_port_range), so test
# isolation across workers is by construction.
